services:
  - type: web
    name: l402-example-node
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: LIGHTNING_ENABLE_API_KEY
        sync: false  # set this in the Render dashboard, don't commit
      - key: NODE_ENV
        value: production
    healthCheckPath: /api/free/health
